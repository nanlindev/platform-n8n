name: Reusable Deploy Python Sidecar

on:
  workflow_call:
    inputs:
      python_image_name:
        required: true
        type: string
      deploy_path:
        required: true
        type: string
      compose_file:
        required: false
        type: string
        default: docker/compose.yml
      build_context:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: python-service/Dockerfile
      compose_service:
        required: true
        type: string
    secrets:
      SSH_HOST:
        required: true
      SSH_PRIVATE_KEY:
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Python Service
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.python_image_name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Python AI Service image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push-python
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u nanlindev --password-stdin

            PLATFORM_DIR="/home/deploy/projects/platform-n8n"
            if [ ! -d "$PLATFORM_DIR" ]; then
              git clone https://github.com/nanlindev/platform-n8n.git "$PLATFORM_DIR"
            fi
            git -C "$PLATFORM_DIR" pull origin main
            chmod +x "$PLATFORM_DIR/scripts/ensure-networks.sh"
            "$PLATFORM_DIR/scripts/ensure-networks.sh"

            grep -q 'external: true' "$PLATFORM_DIR/docker/templates/networks.yml" \
              || { echo "ERROR: platform-n8n networks.yml missing external: true — git pull platform-n8n"; exit 1; }

            cd ${{ inputs.deploy_path }}
            git pull origin main
            if [ ! -f .env ]; then
              echo "ERROR: ${{ inputs.deploy_path }}/.env missing"
              exit 1
            fi

            docker pull ${{ inputs.python_image_name }}:latest
            docker compose -f ${{ inputs.compose_file }} --env-file .env up -d --remove-orphans

            # Fail the job if the sidecar is not running
            docker compose -f ${{ inputs.compose_file }} --env-file .env ps
            running="$(docker compose -f ${{ inputs.compose_file }} --env-file .env ps --status running -q "${{ inputs.compose_service }}" | wc -l)"
            if [ "$running" -lt 1 ]; then
              echo "ERROR: service ${{ inputs.compose_service }} is not running"
              docker compose -f ${{ inputs.compose_file }} --env-file .env logs --tail=50 "${{ inputs.compose_service }}" || true
              exit 1
            fi

            docker image prune -f
            docker logout ghcr.io

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
            exit 1
          fi
