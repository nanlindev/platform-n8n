include:
  - path: templates/networks.yml

services:
  n8n_postgres:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_platform

  n8n_app:
    image: n8nio/n8n
    restart: always
    env_file:
      - ../.env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n_postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "false"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      N8N_OTEL_ENABLED: "true"
      N8N_OTEL_EXPORTER_SERVICE_NAME: n8n-platform
      N8N_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      N8N_OTEL_TRACES_PRODUCTION_ONLY: "false"
      N8N_OTEL_TRACE_PROCESSOR: batch
      N8N_OTEL_TRACES_INJECT_OUTBOUND: "true"
      N8N_LOG_LEVEL: debug
      N8N_DIAGNOSTICS_ENABLED: "false"
    ports:
      - "${N8N_PORT:-5678}:5678"
    cap_add:
      - NET_ADMIN
    depends_on:
      n8n_postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_platform
      - proxy_network

volumes:
  postgres_data:
  n8n_data:

networks:
  n8n_platform:
    external: true
  proxy_network:
    external: true
