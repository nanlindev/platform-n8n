# Shared n8n OpenTelemetry environment variables.
# Reference from platform compose via YAML merge or copy keys into n8n_app.environment.
x-n8n-otel-env: &n8n-otel-env
  N8N_OTEL_ENABLED: "true"
  N8N_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  N8N_OTEL_TRACES_PRODUCTION_ONLY: "false"
  N8N_OTEL_TRACE_PROCESSOR: batch
  N8N_OTEL_TRACES_INJECT_OUTBOUND: "true"
  N8N_LOG_LEVEL: debug
  N8N_DIAGNOSTICS_ENABLED: "false"
