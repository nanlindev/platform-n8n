services:
  python_sidecar_template:
    restart: always
    build:
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - n8n_platform
      - proxy_network
